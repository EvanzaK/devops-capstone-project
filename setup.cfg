[coverage:run]
branch = True
source =
    src
omit =
    tests/*
    setup.cfg

[coverage:report]
show_missing = True
skip_covered = True
fail_under = 80

[nosetests]
verbosity = 2
with-coverage = 1
cover-package = src
cover-erase = 1
cover-html = 1
cover-html-dir = htmlcov

[flake8]
max-line-length = 120
ignore = E203, E266, E501, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    venv

[pylint.MASTER]
ignore = tests, build, dist

[pylint.MESSAGES CONTROL]
disable =
    C0114,  ; missing module docstring
    C0115,  ; missing class docstring
    C0116   ; missing function/method docstring

[pylint.BASIC]
good-names = i,j,k,ex,Run,_
